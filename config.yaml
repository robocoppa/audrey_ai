# ─── Fast Path ───
# For high-confidence simple requests, skip the multi-worker deep panel
# and use a single model from model_registry directly.
#
# tool_capable_models: Models that support Ollama's tool-calling API.
# This list is used by BOTH fast path AND deep panel workers.
# Models NOT listed here will be called without tools (run_model_once)
# to avoid Ollama 400 "does not support tools" errors.
# Do NOT add: deepseek-r1:32b, llava:34b, deepseek-coder-v2:16b
fast_path:
  enabled: true
  confidence_threshold: 0.88   # only fast-path when router is very sure
  tool_capable_models:
    # Cloud models
    - "qwen3.5:397b-cloud"
    - "deepseek-v3.2:cloud"
    - "kimi-k2.5:cloud"
    - "glm-5.1:cloud"
    - "cogito-2.1:671b-cloud"
    - "nemotron-3-super:cloud"
    # Local models
    - "qwen3.5:35b-a3b"
    - "gemma4:31b"
    - "qwen3-coder-next:latest"
    - "qwen2.5-coder:32b"
    - "llama4:latest"
    - "glm-4.7-flash:q8_0"
    - "devstral-small-2:latest"
    - "qwen3-vl:32b"

# ─── Deep Panel (auto — mixed cloud + local workers) ───
deep_panel:
  code:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "qwen3-coder-next:latest"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

  reasoning:
    workers:
      - "cogito-2.1:671b-cloud"
      - "qwen3.5:397b-cloud"
      - "deepseek-r1:32b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

  vl:
    workers:
      - "kimi-k2.5:cloud"
      - "qwen3-vl:32b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

  general:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "qwen3.5:35b-a3b"
    synthesizer: "gemma4:31b"
    fallback_synthesizer: "glm-5.1:cloud"

# ─── Deep Panel Cloud (all cloud: workers + synthesizer) ───
# FIX 1: These panels now benefit from MAX_DEEP_WORKERS_CLOUD=3
# so all 3 workers are used instead of being capped at 2.
deep_panel_cloud:
  code:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "kimi-k2.5:cloud"
    synthesizer: "cogito-2.1:671b-cloud"
    fallback_synthesizer: "glm-5.1:cloud"

  reasoning:
    workers:
      - "cogito-2.1:671b-cloud"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "nemotron-3-super:cloud"
    fallback_synthesizer: "glm-5.1:cloud"

  vl:
    workers:
      - "kimi-k2.5:cloud"
      - "qwen3.5:397b-cloud"
    synthesizer: "glm-5.1:cloud"
    fallback_synthesizer: "deepseek-v3.2:cloud"

  general:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "nemotron-3-super:cloud"
    synthesizer: "glm-5.1:cloud"
    fallback_synthesizer: "kimi-k2.5:cloud"

# ─── Deep Panel Local (all local: workers + synthesizer) ───
deep_panel_local:
  code:
    workers:
      - "qwen3-coder-next:latest"
      - "qwen2.5-coder:32b"
      - "deepseek-coder-v2:16b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "gemma4:31b"

  reasoning:
    workers:
      - "llama4:latest"
      - "deepseek-r1:32b"
      - "nemotron-cascade-2:latest"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-4.7-flash:q8_0"

  vl:
    workers:
      - "qwen3-vl:32b"
      - "llava:34b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "gemma4:31b"

  general:
    workers:
      - "llama4:latest"
      - "qwen3.5:35b-a3b"
      - "nemotron-cascade-2:latest"
    synthesizer: "glm-4.7-flash:q8_0"
    fallback_synthesizer: "olmo-3.1:32b"

# ─── Agentic Features ───
agentic:
  react:
    max_rounds: 3
    compress_after_rounds: 2
    compress_max_result_chars: 2000

  planning:
    enabled: true
    min_tokens: 40

  reflection:
    enabled: true
    max_retries: 1

  escalation:
    enabled: true
    min_response_length: 100
    confidence_ceiling: 0.95

# ─── Timeouts (seconds) ───
timeouts:
  router: 20
  small: 60
  medium: 180
  large: 360
  cloud: 120
  deep_worker: 240
  fast_path: 180

# ─── Cache ───
cache:
  enabled: true
  max_entries: 256
  ttl_seconds: 600

# ─── Search ───
search:
  backend: searxng
  max_results: 5

# ─── Tool Servers ───
tool_servers:
  - "http://custom-tools:8001"

# ─── Tools ───
tools:
  enabled: true
  max_tool_rounds: 5
