# ─── Agentic Features ───
# Controls for the 5 agentic improvements to the orchestrator pipeline.
agentic:
  # IMPROVEMENT 1: ReAct agent loop on fast path
  # Instead of single-shot generation, the fast path now iterates:
  #   think → act (tool call) → observe → repeat
  react:
    max_rounds: 3            # max think/act/observe iterations per request
    # Context compression kicks in during multi-round tool use to prevent
    # context window exhaustion (IMPROVEMENT 5).
    compress_after_rounds: 2   # compress tool history after this many rounds
    compress_max_result_chars: 2000  # truncate individual tool results beyond this

  # IMPROVEMENT 2: Planning node for complex queries
  # Decomposes multi-part questions into focused sub-tasks, then assigns
  # each sub-task to a different deep-panel worker for parallel execution.
  planning:
    enabled: true
    min_tokens: 40           # skip planning for very short/simple queries

  # IMPROVEMENT 3: Reflection gate
  # After generation, a lightweight check (using the router model) verifies
  # the response actually answers the question. If incomplete, it either
  # retries with feedback or escalates to deep panel.
  reflection:
    enabled: true
    max_retries: 1           # how many reflection-guided retries before escalating

  # IMPROVEMENT 4: Adaptive escalation (fast → deep)
  # Automatically escalates from fast path to deep panel when the response
  # appears too thin for the question's complexity.
  escalation:
    enabled: true
    min_response_length: 100       # responses shorter than this trigger length check
    confidence_ceiling: 0.95       # only escalate if confidence is below this

# ─── Timeouts (seconds) ───
timeouts:
  router: 20
  small: 60
  medium: 180
  large: 360
  cloud: 120
  deep_worker: 240
  fast_path: 180

# ─── Cache ───
cache:
  enabled: true
  max_entries: 256
  ttl_seconds: 600

# ─── Search ───
# backend: "searxng" (local, no API key) or "brave" (requires BRAVE_API_KEY env var)
search:
  backend: searxng
  max_results: 5

# ─── Tool Servers ───
# OpenAPI-compatible tool server URLs. The orchestrator discovers tools
# automatically by fetching /openapi.json from each server on startup.
# Accepts plain URL strings or {url, name} dicts.
tool_servers:
  - "http://custom-tools:8001"    # custom tools (search, memory, python, sysmon, fs, sql, docs)
  # - "http://localhost:8002"     # example: openapi-servers/filesystem
  # - "http://localhost:8003"     # example: openapi-servers/memory

# ─── Tools ───
tools:
  enabled: true
  max_tool_rounds: 5
