# ─── Fast Path ───
# For high-confidence simple requests, skip the multi-worker deep panel
# and use a single model from model_registry directly.
fast_path:
  enabled: true
  confidence_threshold: 0.88   # only fast-path when router is very sure
  # Models that support tool calling well enough for the fast path.
  # The orchestrator picks the highest-priority healthy model from the
  # matching task_type list in model_registry.
  tool_capable_models:
    - "qwen3.5:397b-cloud"
    - "deepseek-v3.2:cloud"
    - "kimi-k2.5:cloud"
    - "glm-5.1:cloud"
    - "cogito-2.1:671b-cloud"
    - "nemotron-3-super:cloud"
    - "qwen3.5:35b-a3b"
    - "gemma4:31b"
    - "qwen3-coder-next:latest"
    - "qwen2.5-coder:32b"
    - "llama4:latest"

# ─── Deep Panel (auto — mixed cloud + local workers) ───
# "auto" mode picks from any available model for maximum quality.
deep_panel:
  code:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "qwen3-coder-next:latest"
    synthesizer: "qwen3.5:35b-a3b"
