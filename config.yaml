# ─── Model Registry ───
# Used by the fast-path for high-confidence single-model routing.
# Priority determines selection order; speed/quality are informational.
#
# Removed: llama4:latest (67GB, can't coexist), gemma4:31b (redundant),
#          qwen2.5-coder:32b (covered by qwen3-coder-next),
#          qwen3-vl:32b (llava:34b + kimi-k2.5:cloud cover VL),
#          deepseek-coder-v2:16b (redundant, lowest-priority code worker),
#          olmo-3.1:32b (lowest quality local model, no unique role)
model_registry:
  code:
    - name: "qwen3.5:397b-cloud"
      priority: 14
      speed: 8
      quality: 10
    - name: "deepseek-v3.2:cloud"
      priority: 12
      speed: 9
      quality: 10
    - name: "cogito-2.1:671b-cloud"
      priority: 11
      speed: 7
      quality: 10
    - name: "qwen3-coder-next:latest"
      priority: 10
      speed: 8
      quality: 8
  reasoning:
    - name: "qwen3.5:397b-cloud"
      priority: 14
      speed: 8
      quality: 10
    - name: "cogito-2.1:671b-cloud"
      priority: 13
      speed: 7
      quality: 10
    - name: "deepseek-v3.2:cloud"
      priority: 12
      speed: 9
      quality: 10
    - name: "kimi-k2.5:cloud"
      priority: 11
      speed: 8
      quality: 10
    - name: "nemotron-3-super:cloud"
      priority: 10
      speed: 8
      quality: 9
    - name: "deepseek-r1:32b"
      priority: 9
      speed: 4
      quality: 10
    - name: "qwen3.5:35b-a3b"
      priority: 7
      speed: 6
      quality: 8

  vl:
    - name: "kimi-k2.5:cloud"
      priority: 12
      speed: 8
      quality: 10
    - name: "qwen3-vl:32b"
      priority: 9
      speed: 6
      quality: 9
    - name: "llava:34b"
      priority: 5
      speed: 4
      quality: 7

  general:
    - name: "qwen3.5:397b-cloud"
      priority: 14
      speed: 8
      quality: 10
    - name: "deepseek-v3.2:cloud"
      priority: 12
      speed: 9
      quality: 10
    - name: "glm-5.1:cloud"
      priority: 11
      speed: 9
      quality: 9
    - name: "nemotron-3-super:cloud"
      priority: 10
      speed: 8
      quality: 9
    - name: "qwen3.5:35b-a3b"
      priority: 8
      speed: 6
      quality: 9
    - name: "glm-4.7-flash:q8_0"
      priority: 7
      speed: 7
      quality: 8
# ─── Fast Path ───
# For high-confidence simple requests, skip the multi-worker deep panel
# and use a single model from model_registry directly.
#
# tool_capable_models: Models that support Ollama's tool-calling API.
# This list is used by BOTH fast path AND deep panel workers.
# Models NOT listed here will be called without tools (run_model_once)
# to avoid Ollama 400 "does not support tools" errors.
#
# Trimmed: removed local models that are slow/unreliable at tool loops.
# Kept qwen3.5:35b-a3b (MoE, fast, primary synthesizer — needs tools
# as safety net if all cloud models go down).
fast_path:
  enabled: true
  confidence_threshold: 0.78
  tool_capable_models:
    # Cloud models
    - "qwen3.5:397b-cloud"
    - "deepseek-v3.2:cloud"
    - "kimi-k2.5:cloud"
    - "glm-5.1:cloud"
    - "cogito-2.1:671b-cloud"
    - "nemotron-3-super:cloud"
    # Local models (only the most reliable at tool calling)
    - "qwen3.5:35b-a3b"

# ─── Deep Panel (auto — mixed cloud + local workers) ───
deep_panel:
  code:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "qwen3-coder-next:latest"
    synthesizer: "qwen3.5:397b-cloud"
    fallback_synthesizer: "glm-5.1:cloud"

  reasoning:
    workers:
      - "cogito-2.1:671b-cloud"
      - "qwen3.5:397b-cloud"
      - "deepseek-r1:32b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

  vl:
    workers:
      - "kimi-k2.5:cloud"
      - "qwen3-vl:32b"
      - "llava:34b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

  general:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "qwen3.5:35b-a3b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "glm-5.1:cloud"

# ─── Deep Panel Cloud (all cloud: workers + synthesizer) ───
deep_panel_cloud:
  code:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "kimi-k2.5:cloud"
    synthesizer: "cogito-2.1:671b-cloud"
    fallback_synthesizer: "glm-5.1:cloud"

  reasoning:
    workers:
      - "cogito-2.1:671b-cloud"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "nemotron-3-super:cloud"
    fallback_synthesizer: "glm-5.1:cloud"

  vl:
    workers:
      - "kimi-k2.5:cloud"
      - "qwen3.5:397b-cloud"
    synthesizer: "glm-5.1:cloud"
    fallback_synthesizer: "deepseek-v3.2:cloud"

  general:
    workers:
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
      - "nemotron-3-super:cloud"
    synthesizer: "glm-5.1:cloud"
    fallback_synthesizer: "kimi-k2.5:cloud"

# ─── Deep Panel Local (all local: workers + synthesizer) ───
deep_panel_local:
  code:
    workers:
      - "qwen3-coder-next:latest"
      - "deepseek-r1:32b"
    synthesizer: "qwen3-coder-next:latest"
    fallback_synthesizer: "deepseek-r1:32b"

  reasoning:
    workers:
      - "deepseek-r1:32b"
      - "qwen3.5:35b-a3b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "deepseek-r1:32b"

  vl:
    workers:
      - "qwen3-vl:32b"
      - "llava:34b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "qwen3.5:35b-a3b"

  general:
    workers:
      - "qwen3.5:35b-a3b"
      - "deepseek-r1:32b"
    synthesizer: "qwen3.5:35b-a3b"
    fallback_synthesizer: "deepseek-r1:32b"

# ─── Deep Panel Code (local-first mixed profile for audrey_code) ───
deep_panel_code:
  code:
    workers:
      - "qwen3-coder-next:latest"
      - "deepseek-r1:32b"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "qwen3-coder-next:latest"
    fallback_synthesizer: "qwen3.5:397b-cloud"

  reasoning:
    workers:
      - "qwen3-coder-next:latest"
      - "deepseek-r1:32b"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "qwen3-coder-next:latest"
    fallback_synthesizer: "qwen3.5:397b-cloud"

  vl:
    workers:
      - "qwen3-coder-next:latest"
      - "deepseek-r1:32b"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "qwen3-coder-next:latest"
    fallback_synthesizer: "qwen3.5:397b-cloud"

  general:
    workers:
      - "qwen3-coder-next:latest"
      - "deepseek-r1:32b"
      - "qwen3.5:397b-cloud"
      - "deepseek-v3.2:cloud"
    synthesizer: "qwen3-coder-next:latest"
    fallback_synthesizer: "qwen3.5:397b-cloud"

# ─── Agentic Features ───
agentic:
  react:
    max_rounds: 2
    compress_after_rounds: 2
    compress_max_result_chars: 2000

  planning:
    enabled: false
    min_tokens: 80

  reflection:
    enabled: true
    max_retries: 1

  escalation:
    enabled: true
    min_response_length: 120
    confidence_ceiling: 0.90

# ─── Timeouts (seconds) ───
timeouts:
  router: 20
  small: 60
  medium: 180
  large: 600
  cloud: 120
  deep_worker: 600
  fast_path: 180

# ─── Cache ───
cache:
  enabled: true
  max_entries: 256
  ttl_seconds: 600

# ─── Search ───
search:
  backend: searxng
  max_results: 5

# ─── Tool Servers ───
tool_servers:
  - "http://custom-tools:8001"
  - "http://knowledge-server:8002"

# ─── Tools ───
tools:
  enabled: true
  max_tool_rounds: 5
