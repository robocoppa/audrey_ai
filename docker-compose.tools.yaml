# Tool services only — for running the orchestrator outside Docker.
#
#   docker compose -f docker-compose.tools.yaml up -d

services:
  # ── SearXNG ──
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    networks:
      - ollama-net

  # ── Custom tool server ──
  custom-tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: custom-tools
    restart: unless-stopped
    ports:
      - "${TOOLS_PORT:-8001}:8001"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - TOOLS_SANDBOX_DIR=/app/sandbox
      - TOOLS_MEMORY_DB=/app/data/memory.db
      - TOOLS_SQL_DB=/app/data/local.db
      - TOOLS_PYTHON_TIMEOUT=30
    volumes:
      - tools-data:/app/data
      - tools-sandbox:/app/sandbox
    depends_on:
      - searxng
    networks:
      - ollama-net

networks:
  ollama-net:
    external: true

volumes:
  tools-data:
  tools-sandbox:
