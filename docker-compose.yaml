# Full stack: Audrey + tool services + SearXNG
#
#   docker compose up -d
#
# Requires Ollama running on the host (or adjust OLLAMA_BASE_URL).

services:
  # ── Audrey (orchestrator) ──
  audrey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audrey-ai
    restart: unless-stopped
    ports:
      - "${AUDREY_PORT:-8000}:8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - ROUTER_MODEL=${ROUTER_MODEL:-qwen3:4b}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.2}
      - GPU_CONCURRENCY=${GPU_CONCURRENCY:-1}
      - MAX_DEEP_WORKERS=${MAX_DEEP_WORKERS:-2}
      - MAX_DEEP_WORKERS_CLOUD=${MAX_DEEP_WORKERS_CLOUD:-3}
      - API_KEY=${API_KEY:-}
      - TOOLS_ENABLED=${TOOLS_ENABLED:-true}
      - SEARCH_BACKEND=${SEARCH_BACKEND:-searxng}
      - SEARXNG_URL=http://searxng:8080
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - EMIT_ROUTING_BANNER=${EMIT_ROUTING_BANNER:-true}
      - EMIT_STATUS_UPDATES=${EMIT_STATUS_UPDATES:-true}
      - EMIT_TIMELINE_EVENTS=${EMIT_TIMELINE_EVENTS:-true}
      - EMIT_TRUST_SIGNALS=${EMIT_TRUST_SIGNALS:-true}
      - COMPLEXITY_FORCE_DEEP=${COMPLEXITY_FORCE_DEEP:-true}
      - COMPLEXITY_TOKEN_THRESHOLD=${COMPLEXITY_TOKEN_THRESHOLD:-500}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-America/Denver}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
      - custom-tools
    networks:
      - ollama-net
    labels:
      - net.unraid.docker.icon=/mnt/user/appdata/audrey_ai/images/audrey2.png

  # ── SearXNG (local web search — no API keys) ──
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - TZ=${TZ:-America/Denver}
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    networks:
      - ollama-net
    labels:
      - net.unraid.docker.icon=/mnt/user/appdata/audrey_ai/images/search.png

  # ── Custom tool server ──
  custom-tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: custom-tools
    restart: unless-stopped
    ports:
      - "${TOOLS_PORT:-8001}:8001"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - TOOLS_SANDBOX_DIR=/app/sandbox
      - TOOLS_MEMORY_DB=/app/data/memory.db
      - TOOLS_SQL_DB=/app/data/local.db
      - TOOLS_PYTHON_TIMEOUT=30
      - TZ=${TZ:-America/Denver}
    volumes:
      - tools-data:/app/data
      - tools-sandbox:/app/sandbox
    depends_on:
      - searxng
    networks:
      - ollama-net
    labels:
      - net.unraid.docker.icon=/mnt/user/appdata/audrey_ai/images/toolbox.png

  # ── Knowledge server (document RAG) ──
  knowledge-server:
    build:
      context: .
      dockerfile: Dockerfile.knowledge
    container_name: knowledge-server
    restart: unless-stopped
    ports:
      - "${KNOWLEDGE_PORT:-8002}:8002"
    environment:
      - KNOWLEDGE_ROOT=/knowledge
      - KNOWLEDGE_DB=/app/data/knowledge.db
      - CHUNK_SIZE=${CHUNK_SIZE:-3500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-500}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - EMBED_CONCURRENCY=${EMBED_CONCURRENCY:-4}
      - INGEST_CONCURRENCY=${INGEST_CONCURRENCY:-4}
      - VISION_MODEL=${VISION_MODEL:-qwen3-vl:32b}
      - VISION_ENABLED=${VISION_ENABLED:-true}
      - VISION_PROMPT=${VISION_PROMPT:-}
      - VISION_MIN_BYTES=${VISION_MIN_BYTES:-10240}
      - VISION_MAX_BYTES=${VISION_MAX_BYTES:-20971520}
      - VISION_PARALLEL=${VISION_PARALLEL:-2}
      - AUTO_SCAN=${AUTO_SCAN:-true}
      - RESCAN_INTERVAL=${RESCAN_INTERVAL:-1800}
      - INGEST_QUIET_START=${INGEST_QUIET_START:-20}
      - INGEST_QUIET_END=${INGEST_QUIET_END:-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-America/Denver}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/user/knowledge:/knowledge:ro
      - knowledge-data:/app/data
    networks:
      - ollama-net
    labels:
      - net.unraid.docker.icon=/mnt/user/appdata/audrey_ai/images/knowledge.png

networks:
  ollama-net:
    external: true

volumes:
  tools-data:
  tools-sandbox:
  knowledge-data:
